name: Build Internet-Draft

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      submission_candidate:
        description: 'Produce a numbered submission-candidate rendering (in addition to the neutral -latest artifact) for IETF submission review. The revision is derived from pamspec-version.json and cannot be overridden here: while ietf_submission_status is "not_submitted", only "00" is permitted. This build does NOT submit the draft and does NOT mark it as posted.'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install pytest jsonschema referencing
      - run: gem install kramdown-rfc --no-document

      - name: Validate repository and schemas
        run: python scripts/build_draft.py validate

      - name: Validate test vectors
        run: python scripts/validate_test_vectors.py

      - name: Run reference implementation tests
        run: PYTHONPATH=implementations/reference-python python -m pytest implementations/reference-python/tests -q

      - name: Run MCP adapter tests
        run: PYTHONPATH=implementations/reference-python:bindings/mcp/server-python python -m pytest bindings/mcp/server-python/tests -q

      - name: Run portable conformance suite (in-process + subprocess parity + broken-adapter controls)
        run: PYTHONPATH=.:implementations/reference-python python -m pytest conformance/tests -q

      - name: Build latest (XML/TXT/HTML) — neutral internal artifact
        run: python scripts/build_draft.py all

      - name: Upload latest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: draft-latest
          path: |
            build/draft-infantado-agent-memory-architecture-latest.xml
            build/draft-infantado-agent-memory-architecture-latest.txt
            build/draft-infantado-agent-memory-architecture-latest.html

      - name: Resolve permitted submission-candidate revision
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.submission_candidate == true }}
        id: revguard
        run: |
          set -euo pipefail
          PERMITTED=$(python -c "from scripts.build_draft import permitted_submission_candidate_revision; print(permitted_submission_candidate_revision())")
          echo "Permitted submission-candidate revision from manifest: $PERMITTED"
          echo "permitted=$PERMITTED" >> "$GITHUB_OUTPUT"

      - name: Build submission candidate (guarded)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.submission_candidate == true }}
        run: |
          python scripts/build_draft.py submission-candidate \
            --revision "${{ steps.revguard.outputs.permitted }}" \
            --confirm-submission-candidate

      - name: Upload submission-candidate artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.submission_candidate == true }}
        uses: actions/upload-artifact@v4
        with:
          name: submission-candidate-${{ steps.revguard.outputs.permitted }}
          path: submission-candidates/${{ steps.revguard.outputs.permitted }}/
