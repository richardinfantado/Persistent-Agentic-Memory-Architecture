name: Build Internet-Draft

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python -m pip install -r requirements.txt
      - run: gem install kramdown-rfc --no-document
      - run: python scripts/build_draft.py validate
